services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.6.5
    container_name: open-webui-hai
    ports:
      - "${OPEN_WEBUI_PORT:-3000}:8080"
    env_file:
      - .env.hai
    environment:
      DEFAULT_LOCALE: ${DEFAULT_LOCALE:-zh-CN}
    volumes:
      - open-webui-hai:/app/backend/data
    restart: unless-stopped

volumes:
  open-webui-hai: {}
