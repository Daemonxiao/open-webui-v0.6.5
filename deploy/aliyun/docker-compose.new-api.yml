services:
  new-api:
    image: ${NEW_API_IMAGE:-ghcr.io/heibaijian/tokenfun:latest}
    container_name: new-api-hai
    ports:
      - "${NEW_API_PORT:-3001}:3000"
    env_file:
      - .env.new-api
    volumes:
      - /opt/open-webui/new-api-data:/data
      - /opt/open-webui/new-api-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
