services:
  new-api:
    image: ${NEW_API_IMAGE:-calciumion/new-api:v1.0.0-rc.8}
    container_name: new-api-hai
    ports:
      - "${NEW_API_PORT:-3001}:3000"
    env_file:
      - .env.new-api
    volumes:
      - /opt/open-webui/new-api-data:/data
      - /opt/open-webui/new-api-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  open-webui:
    extends:
      file: docker-compose.open-webui.yml
      service: open-webui
    depends_on:
      - new-api
