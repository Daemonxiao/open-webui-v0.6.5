    </g>
    <g id="ai-mark">
      <line x1="420" y1="838" x2="657" y2="838" stroke="url(#textBlue)" stroke-width="2.5" stroke-linecap="round" filter="url(#blueLineGlow)"/>
      <line x1="893" y1="838" x2="1130" y2="838" stroke="url(#textBlue)" stroke-width="2.5" stroke-linecap="round" filter="url(#blueLineGlow)"/>
      <path d="M734.682 867.000 L747.432 867.000 L752.909 851.001 L778.885 851.001 L784.232 867.000 L797.299 867.000 L773.494 800.070 L758.573 800.070 L734.682 867.000 Z M756.244 841.254 L759.479 831.824 C761.491 825.672 763.518 819.246 766.034 810.808 C768.549 819.246 770.519 825.672 772.502 831.824 L775.650 841.254 L756.244 841.254 Z M815.318 800.070 L803.459 800.070 L803.459 867.000 L815.318 867.000 L815.318 800.070 Z" fill="url(#textBlue)" filter="url(#blueLineGlow)"/>
