<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1550" height="1014" viewBox="0 0 1550 1014" role="img" aria-labelledby="title desc">
  <title id="title">Sparkline AI vector logo</title>
  <desc id="desc">A clean vector logo with a glowing metallic gold star, blue and white waveform bars, Sparkline text, and AI underline.</desc>

  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="43%" r="63%">
      <stop offset="0%" stop-color="#0B2436"/>
      <stop offset="55%" stop-color="#061827"/>
      <stop offset="100%" stop-color="#020D16"/>
    </radialGradient>
    <linearGradient id="goldStar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF3B8"/>
      <stop offset="27%" stop-color="#FFE070"/>
      <stop offset="54%" stop-color="#FFB91E"/>
      <stop offset="76%" stop-color="#FFD765"/>
      <stop offset="100%" stop-color="#FFF4C5"/>
    </linearGradient>
    <radialGradient id="goldStarCore" cx="44%" cy="38%" r="68%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="20%" stop-color="#FFF1A8"/>
      <stop offset="52%" stop-color="#FFCA2E"/>
      <stop offset="100%" stop-color="#B46B00"/>
    </radialGradient>
    <linearGradient id="centerBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#74D0FF"/>
      <stop offset="24%" stop-color="#2BAEFF"/>
      <stop offset="70%" stop-color="#1393EA"/>
      <stop offset="100%" stop-color="#0075C7"/>
    </linearGradient>
    <linearGradient id="barBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#69C8FF"/>
      <stop offset="52%" stop-color="#159DEA"/>
      <stop offset="100%" stop-color="#0078CB"/>
    </linearGradient>
    <linearGradient id="barWhite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#F6FBFF"/>
      <stop offset="100%" stop-color="#E0F0FA"/>
    </linearGradient>
    <linearGradient id="barWhiteBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="45%" stop-color="#F2FAFF"/>
      <stop offset="60%" stop-color="#64CCFF"/>
      <stop offset="100%" stop-color="#0077CE"/>
    </linearGradient>
    <linearGradient id="barWhiteBlueSoft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="48%" stop-color="#F7FCFF"/>
      <stop offset="65%" stop-color="#66C8FB"/>
      <stop offset="100%" stop-color="#0085D8"/>
    </linearGradient>
    <radialGradient id="whiteDot" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="80%" stop-color="#F0F8FF"/>
      <stop offset="100%" stop-color="#D6EAF8"/>
    </radialGradient>
    <linearGradient id="textBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#62C8FF"/>
      <stop offset="100%" stop-color="#0081D7"/>
    </linearGradient>
    <filter id="goldGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="10" result="blur1"/>
      <feColorMatrix in="blur1" type="matrix" values="1 0 0 0 1  0 0.72 0 0 0.52  0 0 0.12 0 0.08  0 0 0 0.85 0" result="goldBlur"/>
      <feMerge>
        <feMergeNode in="goldBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="starFlare" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="barShadow" x="-50%" y="-20%" width="200%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00101A" flood-opacity="0.5"/>
    </filter>
    <filter id="softTinyGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="whiteTextShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="2.5" flood-color="#000815" flood-opacity="0.35"/>
    </filter>
    <filter id="blueLineGlow" x="-50%" y="-300%" width="200%" height="700%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  
  <g id="logo" shape-rendering="geometricPrecision">
    <g id="top-golden-star" filter="url(#goldGlow)">
      <path d="M775 63
C786 111 802 123 852 132
C804 141 787 154 775 203
C763 154 746 141 698 132
C748 123 764 111 775 63Z" fill="url(#goldStar)"/>
      <path d="M775 82
C782 117 794 126 828 132
C794 138 782 147 775 184
C768 147 756 138 722 132
C756 126 768 117 775 82Z" fill="url(#goldStarCore)" opacity="0.92"/>
      <circle cx="775" cy="132" r="5" fill="#FFFFFF" opacity="0.95"/>
      <path d="M775 92 L775 172 M726 132 L824 132" stroke="#FFF0A0" stroke-width="2.2" stroke-linecap="round" opacity="0.8" filter="url(#starFlare)"/>
      <path d="M750 109 L801 155 M801 109 L750 155" stroke="#FFE37D" stroke-width="1.2" stroke-linecap="round" opacity="0.38"/>
    </g>
    <g id="waveform-bars">
      <circle cx="457" cy="439" r="9" fill="url(#whiteDot)" filter="url(#softTinyGlow)"/>
      <rect x="494" y="424" width="16" height="43" rx="9" fill="url(#barWhite)" filter="url(#barShadow)"/>
      <rect x="543" y="407" width="17" height="87" rx="9" fill="url(#barWhite)" filter="url(#barShadow)"/>
      <rect x="591" y="378" width="17" height="130" rx="9" fill="url(#barWhiteBlue)" filter="url(#barShadow)"/>
      <rect x="646" y="339" width="18" height="181" rx="9" fill="url(#barBlue)" filter="url(#barShadow)"/>
      <rect x="698" y="287" width="18" height="247" rx="9" fill="url(#barBlue)" filter="url(#barShadow)"/>
      <rect x="766" y="218" width="18" height="340" rx="9" fill="url(#centerBlue)" filter="url(#barShadow)"/>
      <rect x="812" y="285" width="18" height="241" rx="9" fill="url(#barWhiteBlueSoft)" filter="url(#barShadow)"/>
      <rect x="865" y="334" width="18" height="164" rx="9" fill="url(#barWhiteBlueSoft)" filter="url(#barShadow)"/>
      <rect x="920" y="367" width="18" height="129" rx="9" fill="url(#barWhiteBlueSoft)" filter="url(#barShadow)"/>
      <rect x="974" y="392" width="17" height="82" rx="9" fill="url(#barWhite)" filter="url(#barShadow)"/>
      <rect x="1021" y="417" width="16" height="40" rx="9" fill="url(#barWhite)" filter="url(#barShadow)"/>
      <circle cx="1064" cy="439" r="9" fill="url(#whiteDot)" filter="url(#softTinyGlow)"/>
    </g>
